<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56" role="img">
  <title>LolSuit horizontal TopBar lockup</title>
  <desc>Compact horizontal LolSuit brand lockup for headers and navigation bars. Small scales-of-justice icon on the left, stacked "The court of" caption above the "LolSuit" wordmark on the right. Transparent background. Brand color: deep purple (#3C3489).</desc>

  <g stroke="#3C3489" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="24" cy="17" r="1.8" fill="#3C3489" stroke="none"/>
    <line x1="24" y1="17" x2="24" y2="44" stroke-width="2"/>
    <line x1="11" y1="22" x2="37" y2="22" stroke-width="2"/>
    <circle cx="11" cy="22" r="1.4" fill="#3C3489" stroke="none"/>
    <circle cx="37" cy="22" r="1.4" fill="#3C3489" stroke="none"/>
    <line x1="11" y1="22" x2="7" y2="30" stroke-width="0.8"/>
    <line x1="11" y1="22" x2="15" y2="30" stroke-width="0.8"/>
    <line x1="37" y1="22" x2="33" y2="30" stroke-width="0.8"/>
    <line x1="37" y1="22" x2="41" y2="30" stroke-width="0.8"/>
    <path d="M 5 30 Q 11 36 17 30" stroke-width="1.3"/>
    <path d="M 31 30 Q 37 36 43 30" stroke-width="1.3"/>
    <rect x="17" y="44" width="14" height="2" fill="#3C3489" stroke="none"/>
  </g>

  <text x="60" y="22" font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="#3C3489" letter-spacing="2.5" font-weight="500">THE COURT OF</text>
  <text x="60" y="46" font-family="Georgia, 'Times New Roman', serif" font-size="26" fill="#3C3489" font-weight="700" letter-spacing="-0.5">LolSuit</text>
</svg>
