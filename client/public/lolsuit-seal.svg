<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" role="img">
  <title>LolSuit official court seal</title>
  <desc>Circular court-seal brand mark for LolSuit. Top arc: "The court of LolSuit". Bottom arc: "Est. for fun · MMXXVI". Scales of justice in the center, ribbon banner with the LolSuit wordmark. Brand color: deep purple (#3C3489).</desc>

  <g transform="translate(180, 180)">

    <!-- Outer thick ring -->
    <circle cx="0" cy="0" r="160" fill="none" stroke="#3C3489" stroke-width="4"/>
    <!-- Inner thin ring -->
    <circle cx="0" cy="0" r="138" fill="none" stroke="#3C3489" stroke-width="1"/>
    <!-- Innermost ring (around the scales) -->
    <circle cx="0" cy="0" r="86" fill="none" stroke="#3C3489" stroke-width="1"/>

    <defs>
      <path id="sealTop" d="M -114 -80 A 140 140 0 0 1 114 -80" fill="none"/>
      <path id="sealBottom" d="M -125 88 A 153 153 0 0 0 125 88" fill="none"/>
    </defs>

    <text font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#3C3489" letter-spacing="2.5" font-weight="700">
      <textPath href="#sealTop" startOffset="50%" text-anchor="middle">THE COURT OF LOLSUIT</textPath>
    </text>

    <text font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#3C3489" letter-spacing="2" font-weight="700">
      <textPath href="#sealBottom" startOffset="50%" text-anchor="middle">EST. FOR FUN · MMXXVI</textPath>
    </text>

    <!-- Side ornaments at 3 and 9 o'clock -->
    <g fill="#3C3489" font-family="Georgia, serif" font-size="18" text-anchor="middle">
      <text x="-149" y="6">★</text>
      <text x="149" y="6">★</text>
    </g>

    <!-- Scales of justice -->
    <g stroke="#3C3489" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <circle cx="0" cy="-55" r="4" fill="#3C3489" stroke="none"/>
      <line x1="0" y1="-52" x2="0" y2="22" stroke-width="3"/>
      <line x1="-44" y1="-42" x2="44" y2="-42" stroke-width="3"/>
      <circle cx="-44" cy="-42" r="2.8" fill="#3C3489" stroke="none"/>
      <circle cx="44" cy="-42" r="2.8" fill="#3C3489" stroke="none"/>
      <line x1="-44" y1="-42" x2="-56" y2="-18" stroke-width="1.2"/>
      <line x1="-44" y1="-42" x2="-32" y2="-18" stroke-width="1.2"/>
      <line x1="44" y1="-42" x2="32" y2="-18" stroke-width="1.2"/>
      <line x1="44" y1="-42" x2="56" y2="-18" stroke-width="1.2"/>
      <path d="M -62 -18 Q -44 4 -26 -18" stroke-width="2.5"/>
      <path d="M 26 -18 Q 44 4 62 -18" stroke-width="2.5"/>
      <rect x="-24" y="22" width="48" height="4" fill="#3C3489" stroke="none"/>
    </g>

    <!-- Ribbon banner with wordmark -->
    <rect x="-58" y="40" width="116" height="24" fill="#3C3489"/>
    <text x="0" y="57" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#FFFFFF" text-anchor="middle" font-weight="700" letter-spacing="2.5">LolSuit</text>

  </g>
</svg>
